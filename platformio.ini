; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:d1_mini]
platform = espressif8266@^4.0.0
board = d1_mini
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = COM4
; lib_ldf_mode = chain+   
lib_deps =
    bblanchon/ArduinoJson@^6.21.0

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Os
    -Wall
    -Wl,--gc-sections
    -ffunction-sections
    -fdata-sections

; Partición: 2MB app + 2MB OTA (necesario para que Update.begin() tenga espacio)
; Sin esto el OTA falla si el firmware supera ~500KB
board_build.ldscript = eagle.flash.4m2m.ld

board_build.filesystem = littlefs
