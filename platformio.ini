[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps = 
    https://github.com/yknivag/ESP_OTA_GitHub.git
    bblanchon/ArduinoJson@^6.21.0
    paulstoffregen/Time@^1.6.1
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -Os
    -Wall
    -Wl,--gc-sections
    -ffunction-sections
    -fdata-sections
