name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "[0-9]+.[0-9]+.[0-9]+" # dispara solo con tags como 1.0.1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # necesario para crear releases y subir assets

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run

      # Lee la versión desde version.txt solo cuando viene de un tag
      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      # Crea la release SOLO cuando el push es un tag (no en cada commit a main)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }} # ej: 1.0.2  (sin v)
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: .pio/build/d1_mini/firmware.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
